
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Editor de Imágenes</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: #1e1e1e;
      color: white;
    }

    canvas {
      margin-top: 20px;
      border: 2px solid #555;
      max-width: 90%;
    }

    .controles {
      margin-top: 20px;
    }

    input, select, button {
      margin: 5px;
    }

    .oculto {
      display: none;
    }

    #placeholder {
      margin-top: 20px;
      opacity: 0.6;
    }

    #info {
      margin-top: 20px;
      background: #333;
      padding: 10px;
      border-radius: 10px;
      display: inline-block;
      text-align: left;
    }
  </style>
</head>
<body>

  <h1>Editor de Imágenes</h1>

  <!-- Subir imagen -->
  <input type="file" id="upload" accept="image/*">

  <div id="placeholder">Sube una imagen para empezar</div>

  <!-- Canvas -->
  <canvas id="canvas" class="oculto"></canvas>

  <!-- Controles -->
  <div class="controles">

    <div>
      Brillo: <span id="valorBrillo">0</span><br>
      <input type="range" id="brillo" min="-100" max="100" value="0">
    </div>

    <div>
      Contraste: <span id="valorContraste">1.00</span><br>
      <input type="range" id="contraste" min="0" max="200" value="100">
    </div>

    <div>
      Calidad: <span id="valorCalidad">0.8</span><br>
      <input type="range" id="calidad" min="0.1" max="1" step="0.1" value="0.8">
    </div>

    <div>
      Escala: <span id="valorEscala">100%</span><br>
      <input type="range" id="escala" min="10" max="200" value="100">
    </div>

    <div>
      Formato:
      <select id="formato">
        <option value="image/png">PNG</option>
        <option value="image/jpeg">JPG</option>
        <option value="image/webp">WEBP</option>
      </select>
    </div>

    <br>

    <button id="btnReset">Resetear</button>
    <button id="btnDescargar">Descargar</button>

  </div>

  <!-- Info -->
  <div id="info"></div>

  <!-- Tu JS -->
  <script src="photoshop.js"></script>

</body>
</html>
